<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stardust Music - Dashboard</title>
    <link rel="stylesheet" href="style_home.css">
</head>
<body>

<header class="main-header">
    <div class="header-left">
        <img src="logo.png" alt="Logo" class="nav-logo">
        <h1>STARDUST MUSIC</h1>
    </div>
    <a href="page.html">
        <button id="logout-btn" class="logout-btn">Logout</button>
    </a>
</header>

<main class="content-container">
    <section class="user-banner">
        <h2 id="welcome-msg">Welcome Back <span id="username">User</span>!</h2>
    </section>

    <section class="subscription-section">
        <div class="sub-header">
            <div class="sub-title-box">Your Subscriptions!</div>
            <div class="add-songs-box" onclick="toggleModal(true)">
                <span>Add New Songs?</span>
                <button class="plus-btn">+</button>
            </div>
        </div>

        <table class="music-table">
            <thead>
            <tr>
                <th>#</th>
                <th>Image</th>
                <th>Title</th>
                <th>Artists</th>
                <th>Album</th>
                <th>Year</th>
                <th>Remove</th>
            </tr>
            </thead>
            <tbody id="subscription-body">
            </tbody>
        </table>
    </section>
</main>

<div id="query-modal" class="modal-overlay">
    <div class="modal-content">
        <div class="modal-top-bar">
            <span class="close-x" onclick="toggleModal(false)">&times;</span>
        </div>

        <div class="query-inputs">
            <div class="input-group">
                <label>Title</label>
                <input type="text" id="q-title" placeholder="TEXT BOX">
            </div>
            <div class="input-group">
                <label>Artist</label>
                <input type="text" id="q-artist" placeholder="TEXT BOX">
            </div>
            <div class="input-group">
                <label>Year</label>
                <input type="text" id="q-year" placeholder="TEXT BOX">
            </div>
            <div class="input-group">
                <label>Album</label>
                <input type="text" id="q-album" placeholder="TEXT BOX">
            </div>

            <!-- ✅ Fixed button -->
            <button class="search-btn" onclick="performSearch()">Search!</button>
        </div>

        <div class="results-area">
            <div class="results-label">Your Matching Results:</div>
            <table class="music-table">
                <thead>
                <tr>
                    <th>#</th>
                    <th>Image</th>
                    <th>Title</th>
                    <th>Artists</th>
                    <th>Album</th>
                    <th>Year</th>
                    <th>Subscribe</th>
                </tr>
                </thead>
                <tbody id="query-results-body">
                </tbody>
            </table>
        </div>

        <div id="no-results-popup" class="error-modal" style="display: none;">
            <span class="close-x-small" onclick="closeError()">&times;</span>
            <p>No result is retrieved. Please query again</p>
        </div>
    </div>
</div>

<script>
    // Show / hide modal
    function toggleModal(show) {
        document.getElementById('query-modal').style.display = show ? 'flex' : 'none';
    }

    function closeError() {
        document.getElementById('no-results-popup').style.display = 'none';
    }

    // ✅ Search button now works
    function performSearch() {
        alert("Search button clicked!");
    }
</script>

</body>
</html>
