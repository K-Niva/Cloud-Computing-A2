<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Stardust Music - Login</title>
    <link rel="stylesheet" href="style_login.css">
</head>
<body>

<header>
    <nav>
        <img src="logo.png" alt="Stardust Music Logo" width="50">
        <h1>STARDUST MUSIC</h1>
    </nav>
</header>

<main>
    <section id="login-container">
        <h2>Log In</h2>

        <p>Need an Account? <a href="register.html">Create Account Now!</a></p>

        <!-- Changed: removed PHP backend -->
        <form id="login-form">

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>

            <button type="submit">ENTER</button>

        </form>

        <p id="error-message" style="color: red;"></p>

    </section>
</main>

<!-- Backend connection script -->
<script>
    document.getElementById("login-form").addEventListener("submit", async function(e) {
        e.preventDefault();

        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;

        try {
            const response = await fetch("/login", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ email, password })
            });

            const data = await response.json();

            if (data.success) {
                // optional: store user in browser session
                localStorage.setItem("email", email);
                localStorage.setItem("user_name", data.user_name);

                // redirect to main page
                window.location.href = "main.html";
            } else {
                document.getElementById("error-message").innerText =
                    "email or password is invalid";
            }

        } catch (error) {
            console.log(error);
            document.getElementById("error-message").innerText =
                "Server error. Please try again.";
        }
    });
</script>

</body>
</html>
