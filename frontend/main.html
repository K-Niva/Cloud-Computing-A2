<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stardust Music - Dashboard</title>
    <link rel="stylesheet" href="style_home.css">
</head>
<body>

<header class="main-header">
    <div class="header-left">
        <img src="logo.png" alt="Logo" class="nav-logo">
        <h1>STARDUST MUSIC</h1>
    </div>
    <a href="login.html">
        <button id="logout-btn" class="logout-btn" onclick="logout()">Logout</button>
    </a>
</header>

<main class="content-container">
    <section class="user-banner">
        <h1 id="welcome-msg">Welcome Back <span id="user_name">User</span>!</h1>
    </section>

    <section class="subscription-section">
        <div class="sub-header">
            <div class="sub-title-box">Your Subscriptions!</div>

            <button class="add-songs-box" onclick="toggleModal(true)">
                <span>Add New Songs?</span>
                <span class="plus-btn">+</span>
            </button>
        </div>

        <table class="music-table">
            <thead>
            <tr>
                <th>#</th>
                <th>Image</th>
                <th>Title</th>
                <th>Artists</th>
                <th>Album</th>
                <th>Year</th>
                <th>Remove</th>
            </tr>
            </thead>
            <tbody id="subscription-body"></tbody>
        </table>
    </section>
</main>

<!-- MODAL -->
<div id="query-modal" class="modal-overlay">
    <div class="modal-content">

        <div class="modal-top-bar">
            <span class="close-x" onclick="toggleModal(false)">&times;</span>
        </div>

        <div class="query-inputs">

            <div class="input-group">
                <label>Title</label>
                <input type="text" id="q-title" placeholder="Text box">
            </div>

            <div class="input-group">
                <label>Artist</label>
                <input type="text" id="q-artist" placeholder="Text box">
            </div>

            <div class="input-group">
                <label>Year</label>
                <input type="text" id="q-year" placeholder="Text box">
            </div>

            <div class="input-group">
                <label>Album</label>
                <input type="text" id="q-album" placeholder="Text box">
            </div>

            <button class="search-btn-modal" onclick="performSearch()">Search!</button>
        </div>

        <div class="results-area">
            <div class="results-label">Your Matching Results !! :</div>

            <table class="music-table">
                <thead>
                <tr>
                    <th>#</th>
                    <th>Image</th>
                    <th>Title</th>
                    <th>Artists</th>
                    <th>Album</th>
                    <th>Year</th>
                    <th>Subscribe</th>
                </tr>
                </thead>
                <tbody id="query-results-body"></tbody>
            </table>
        </div>

        <div id="no-results-popup" class="error-modal" style="display:none;">
            <span class="close-x-small" onclick="closeError()">&times;</span>
            <p>No result is retrieved. Please query again</p>
        </div>

    </div>
</div>

<script>

    function toggleModal(show) {
        document.getElementById('query-modal').style.display = show ? 'flex' : 'none';
    }

    function closeError() {
        document.getElementById('no-results-popup').style.display = 'none';
    }

window.onload = () => {

    const username = localStorage.getItem("user_name");

    if (username) {
        document.getElementById("user_name").innerText = username;
    } else {
        document.getElementById("user_name").innerText = "User";
    }

    loadSubscriptions();
};

    /* =========================
       SEARCH MUSIC (EC2)
    ========================= */
    async function performSearch() {

        const title = document.getElementById("q-title").value;
        const artist = document.getElementById("q-artist").value;
        const year = document.getElementById("q-year").value;
        const album = document.getElementById("q-album").value;

        const query = new URLSearchParams({
            title,
            artist,
            year,
            album
        });

        try {
            const res = await fetch(`/music/search?${query}`);
            const data = await res.json();

            const tbody = document.getElementById("query-results-body");
            tbody.innerHTML = "";

            if (!data || data.length === 0) {
                document.getElementById("no-results-popup").style.display = "block";
                return;
            }

            data.forEach((song, index) => {

                const row = `
                    <tr>
                        <td>${index + 1}</td>
                        <td><img src="${song.img_url}" width="50"></td>
                        <td>${song.title}</td>
                        <td>${song.artist}</td>
                        <td>${song.album}</td>
                        <td>${song.year}</td>
                        <td>
                            <button data-song='${JSON.stringify(song)}'
                                    onclick="subscribeSong(JSON.parse(this.dataset.song))">
                                Subscribe
                            </button>
                        </td>
                    </tr>
                `;

                tbody.innerHTML += row;
            });

        } catch (err) {
            console.log(err);
            alert("Search failed");
        }
    }

    /* =========================
       SUBSCRIBE SONG
    ========================= */
    async function subscribeSong(song) {

        const email = localStorage.getItem("email");

        if (!email) {
            alert("No user logged in");
            return;
        }

        try {
            await fetch("/subscribe", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    email,
                    song_id: song.album + "#" + song.title,
                    title: song.title,
                    artist: song.artist,
                    album: song.album,
                    year: song.year,
                    img_url: song.img_url
                })
            });

            alert("Subscribed!");
            loadSubscriptions();

        } catch (err) {
            console.log(err);
        }
    }

    /* =========================
       LOAD SUBSCRIPTIONS
    ========================= */
    async function loadSubscriptions() {

        const email = localStorage.getItem("email");

        if (!email) return;

        try {
            const res = await fetch(`/subscriptions?email=${email}`);
            const data = await res.json();

            const tbody = document.getElementById("subscription-body");
            tbody.innerHTML = "";

            data.forEach((song, index) => {

                const row = `
                    <tr>
                        <td>${index + 1}</td>
                        <td><img src="${song.img_url}" width="50"></td>
                        <td>${song.title}</td>
                        <td>${song.artist}</td>
                        <td>${song.album}</td>
                        <td>${song.year}</td>
                        <td>
                            <button onclick="removeSong('${song.email}', '${song.song_id}')">
                                Remove
                            </button>
                        </td>
                    </tr>
                `;

                tbody.innerHTML += row;
            });

        } catch (err) {
            console.log(err);
        }
    }

    /* =========================
       REMOVE SUBSCRIPTION
    ========================= */
    async function removeSong(email, song_id) {

    try {
        await fetch("/subscription", {
            method: "DELETE",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                email,
                song_id
            })
        });

        loadSubscriptions();

    } catch (err) {
        console.log(err);
    }
}

    /* =========================
       LOGOUT
    ========================= */
    function logout() {
        localStorage.removeItem("email");
        window.location.href = "/";
    }

</script>

</body>
</html>
